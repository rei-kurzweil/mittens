<svg xmlns="http://www.w3.org/2000/svg" width="820" height="730" viewBox="0 0 820 730">
  <defs>
    <marker id="a"  markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#546e7a"/></marker>
    <marker id="ab" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#29b6f6"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#69f0ae"/></marker>
    <marker id="ap" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ce93d8"/></marker>
    <marker id="ao" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ff8a65"/></marker>
    <style>text { font-family: "JetBrains Mono","Fira Mono","Courier New",monospace; }</style>
  </defs>

  <!-- Background -->
  <rect width="820" height="730" fill="#12141a"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#b0bec5">Cat Engine · Post-Processing Render Graph</text>
     <text x="410" y="44" text-anchor="middle" font-size="10" fill="#546e7a">RenderGraphComponent present — passes below activate conditionally</text>

  <!-- ─────────────────────────────────────────────────────────────────
       ROW: Geometry scope  (compact)
       ───────────────────────────────────────────────────────────────── -->
  <rect x="20" y="60" width="164" height="240" rx="5" fill="#0d1117" stroke="#37474f" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="102" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#78909c">Geometry Scope</text>
  <text x="102" y="93" text-anchor="middle" font-size="9" fill="#455a64">(begin_rendering)</text>

  <rect x="30" y="100" width="144" height="22" rx="2" fill="#0d1433"/>
  <rect x="30" y="100" width="4"   height="22" rx="1" fill="#5c6bc0"/>
  <text x="40" y="115" font-size="9" fill="#9fa8da">1  Background</text>

  <rect x="30" y="126" width="144" height="22" rx="2" fill="#180d2e"/>
  <rect x="30" y="126" width="4"   height="22" rx="1" fill="#7b1fa2"/>
  <text x="40" y="141" font-size="9" fill="#ce93d8">2  Bg Occluded+Lit</text>

  <text x="102" y="159" text-anchor="middle" font-size="8" fill="#37474f">· depth clear ·</text>

  <rect x="30" y="163" width="144" height="22" rx="2" fill="#0a1f0a"/>
  <rect x="30" y="163" width="4"   height="22" rx="1" fill="#2e7d32"/>
  <text x="40" y="178" font-size="9" fill="#81c784">3  Opaque + Emissive</text>

  <rect x="30" y="189" width="144" height="22" rx="2" fill="#0f1f00"/>
  <rect x="30" y="189" width="4"   height="22" rx="1" fill="#558b2f"/>
  <text x="40" y="204" font-size="9" fill="#aed581">4  Cutout</text>

  <rect x="30" y="215" width="144" height="22" rx="2" fill="#2e0e00"/>
  <rect x="30" y="215" width="4"   height="22" rx="1" fill="#e65100"/>
  <text x="40" y="230" font-size="9" fill="#ff8a65">5+6  Transparent</text>

  <text x="102" y="252" text-anchor="middle" font-size="8" fill="#37474f">· depth clear ·</text>

  <rect x="30" y="256" width="144" height="22" rx="2" fill="#12003a"/>
  <rect x="30" y="256" width="4"   height="22" rx="1" fill="#4a148c"/>
  <text x="40" y="271" font-size="9" fill="#ba68c8">7  Overlay</text>
  <text x="102" y="292" text-anchor="middle" font-size="9" fill="#455a64">(end_rendering)</text>

  <!-- Geometry → Intermediate HDR (main arrow right) -->
  <line x1="184" y1="180" x2="210" y2="180" stroke="#546e7a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Geometry → Depth stored (down-right arrow) -->
  <line x1="102" y1="300" x2="102" y2="368" stroke="#ff8a65" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="102" y1="368" x2="210" y2="368" stroke="#ff8a65" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ao)"/>

  <!-- ─────────────────────────────────────────────────────────────────
       IMAGE: Intermediate HDR Color
       ───────────────────────────────────────────────────────────────── -->
  <rect x="214" y="152" width="162" height="72" rx="5" fill="#001822" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="295" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#29b6f6">Intermediate HDR</text>
  <text x="295" y="184" text-anchor="middle" font-size="9" fill="#0277bd">R16G16B16A16_SFLOAT</text>
  <text x="295" y="198" text-anchor="middle" font-size="9" fill="#0277bd">linear · full res</text>
  <text x="295" y="212" text-anchor="middle" font-size="8" fill="#37474f">geometry renders here, not swapchain</text>

  <!-- ─────────────────────────────────────────────────────────────────
       IMAGE: Depth Stored
       ───────────────────────────────────────────────────────────────── -->
  <rect x="214" y="352" width="162" height="60" rx="5" fill="#200a00" stroke="#ff8a65" stroke-width="1.5"/>
  <text x="295" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#ff8a65">Depth (Stored)</text>
  <text x="295" y="384" text-anchor="middle" font-size="9" fill="#e64a19">D32_SFLOAT  store=Store</text>
  <text x="295" y="398" text-anchor="middle" font-size="9" fill="#e64a19">R32_SFLOAT resolved (MSAA)</text>

  <!-- ─────────────────────────────────────────────────────────────────
       BLOOM BLOCK (conditional)
       ───────────────────────────────────────────────────────────────── -->
  <rect x="400" y="60" width="400" height="280" rx="6" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#64b5f6">BloomComponent  (optional)</text>

  <!-- Intermediate HDR → Emissive Prepass -->
  <line x1="376" y1="188" x2="400" y2="130" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>

  <!-- Depth → Emissive Prepass (read-only for occlusion) -->
  <line x1="295" y1="352" x2="295" y2="130" stroke="#ff8a65" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="295" y1="130" x2="400" y2="120" stroke="#ff8a65" stroke-width="1" stroke-dasharray="2,3" marker-end="url(#ao)"/>
  <text x="320" y="240" font-size="8" fill="#37474f">depth (read-only</text>
  <text x="320" y="252" font-size="8" fill="#37474f">for occlusion)</text>

  <!-- [2] Emissive Prepass -->
  <rect x="412" y="90" width="128" height="52" rx="4" fill="#001435" stroke="#1565c0" stroke-width="1"/>
  <text x="476" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[2] Emissive Prepass</text>
  <text x="476" y="125" text-anchor="middle" font-size="9" fill="#64b5f6">EMISSIVE_TOON_MESH only</text>
  <text x="476" y="137" text-anchor="middle" font-size="8" fill="#37474f">writes HDR Emissive Buffer</text>

  <!-- Prepass → Blur H -->
  <line x1="540" y1="116" x2="558" y2="116" stroke="#1565c0" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- [3] Bloom Blur H -->
  <rect x="560" y="90" width="90" height="52" rx="4" fill="#001435" stroke="#1565c0" stroke-width="1"/>
  <text x="605" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[3] Blur H</text>
  <text x="605" y="125" text-anchor="middle" font-size="9" fill="#64b5f6">Gaussian horiz.</text>
  <text x="605" y="137" text-anchor="middle" font-size="8" fill="#37474f">half-res if half_res=true</text>

  <!-- Blur H → Blur V (down) -->
  <line x1="605" y1="142" x2="605" y2="162" stroke="#1565c0" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- [4] Bloom Blur V -->
  <rect x="560" y="164" width="90" height="52" rx="4" fill="#001435" stroke="#1565c0" stroke-width="1"/>
  <text x="605" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[4] Blur V</text>
  <text x="605" y="199" text-anchor="middle" font-size="9" fill="#64b5f6">Gaussian vert.</text>
  <text x="605" y="211" text-anchor="middle" font-size="8" fill="#37474f">→ Blurred Emissive buf</text>

  <!-- Blur V → Composite (left arrow) -->
  <line x1="560" y1="190" x2="544" y2="190" stroke="#1565c0" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- [5] Bloom Composite -->
  <rect x="412" y="164" width="128" height="52" rx="4" fill="#001435" stroke="#1565c0" stroke-width="1"/>
  <text x="476" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[5] Bloom Composite</text>
  <text x="476" y="199" text-anchor="middle" font-size="9" fill="#64b5f6">additive blend into HDR</text>
  <text x="476" y="211" text-anchor="middle" font-size="8" fill="#37474f">main + blurred * intensity</text>

  <!-- Bloom Composite → Intermediate HDR (back arrow) -->
  <line x1="412" y1="190" x2="376" y2="190" stroke="#29b6f6" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- Bloom label note -->
  <text x="600" y="256" text-anchor="middle" font-size="9" fill="#1565c0">radius_ndc → pixels at render time</text>
  <text x="600" y="270" text-anchor="middle" font-size="9" fill="#1565c0">radius_px = radius_ndc × (vp_w / 2)</text>
  <text x="600" y="284" text-anchor="middle" font-size="9" fill="#1565c0">EmissiveSource tag: bloom source selection</text>
  <text x="600" y="298" text-anchor="middle" font-size="9" fill="#1565c0">skip pass if zero emissive instances</text>

  <!-- ─────────────────────────────────────────────────────────────────
       BOKEH BLOCK (conditional)
       ───────────────────────────────────────────────────────────────── -->
  <rect x="400" y="370" width="400" height="256" rx="6" fill="none" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="386" text-anchor="middle" font-size="10" font-weight="700" fill="#ce93d8">BokehComponent  (optional)</text>

  <!-- Depth → CoC Pass -->
  <line x1="376" y1="382" x2="400" y2="430" stroke="#ff8a65" stroke-width="1.2" marker-end="url(#ao)"/>

  <!-- [6] CoC Computation -->
  <rect x="412" y="400" width="128" height="52" rx="4" fill="#1a0028" stroke="#6a1b9a" stroke-width="1"/>
  <text x="476" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#ce93d8">[6] CoC Pass</text>
  <text x="476" y="435" text-anchor="middle" font-size="9" fill="#ab47bc">depth → circle-of-confusion</text>
  <text x="476" y="447" text-anchor="middle" font-size="8" fill="#37474f">R16_SFLOAT output</text>

  <!-- CoC → Bokeh Blur -->
  <line x1="540" y1="426" x2="558" y2="426" stroke="#6a1b9a" stroke-width="1.2" marker-end="url(#ap)"/>

  <!-- Intermediate HDR → Bokeh Blur (down arrow) -->
  <line x1="376" y1="224" x2="376" y2="420" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="376" y1="420" x2="560" y2="426" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>

  <!-- [7] Bokeh Blur -->
  <rect x="560" y="400" width="90" height="52" rx="4" fill="#1a0028" stroke="#6a1b9a" stroke-width="1"/>
  <text x="605" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#ce93d8">[7] Bokeh Blur</text>
  <text x="605" y="435" text-anchor="middle" font-size="9" fill="#ab47bc">variable-radius by CoC</text>
  <text x="605" y="447" text-anchor="middle" font-size="8" fill="#37474f">→ DoF Blurred image</text>

  <!-- Blur V (bokeh) → Composite (left) -->
  <line x1="560" y1="452" x2="544" y2="470" stroke="#6a1b9a" stroke-width="1.2" marker-end="url(#ap)"/>

  <!-- [8] DoF Composite -->
  <rect x="412" y="470" width="128" height="52" rx="4" fill="#1a0028" stroke="#6a1b9a" stroke-width="1"/>
  <text x="476" y="490" text-anchor="middle" font-size="11" font-weight="700" fill="#ce93d8">[8] DoF Composite</text>
  <text x="476" y="505" text-anchor="middle" font-size="9" fill="#ab47bc">lerp(sharp, blur, coc)</text>
  <text x="476" y="517" text-anchor="middle" font-size="8" fill="#37474f">overwrites Intermediate HDR</text>

  <!-- DoF Composite → Intermediate HDR (back arrow) -->
  <line x1="412" y1="496" x2="376" y2="224" stroke="#ce93d8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>

  <text x="600" y="558" text-anchor="middle" font-size="9" fill="#6a1b9a">requires stored depth</text>
  <text x="600" y="572" text-anchor="middle" font-size="9" fill="#6a1b9a">triggers depth Store op + MSAA resolve</text>
  <text x="600" y="586" text-anchor="middle" font-size="9" fill="#6a1b9a">focus_distance · aperture · max_blur_radius</text>
  <text x="600" y="600" text-anchor="middle" font-size="9" fill="#6a1b9a">depth shared with Bloom if both present</text>
  <text x="600" y="614" text-anchor="middle" font-size="9" fill="#6a1b9a">separable Gaussian, per-pixel radius</text>

  <!-- ─────────────────────────────────────────────────────────────────
       [9] Final Blit → Swapchain
       ───────────────────────────────────────────────────────────────── -->

  <!-- HDR → Final Blit (arrow from top of column, skips Bloom/Bokeh) -->
  <line x1="376" y1="152" x2="376" y2="80" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="376" y1="80" x2="718" y2="80" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="718" y1="80" x2="718" y2="648" stroke="#29b6f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>

  <rect x="644" y="650" width="160" height="54" rx="5" fill="#001022" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="724" y="672" text-anchor="middle" font-size="11" font-weight="700" fill="#4fc3f7">[9] Final Blit</text>
  <text x="724" y="686" text-anchor="middle" font-size="9" fill="#0288d1">tone-map / gamma encode</text>
  <text x="724" y="698" text-anchor="middle" font-size="8" fill="#37474f">Intermediate HDR → Swapchain</text>

  <!-- Final Blit → Swapchain -->
  <line x1="724" y1="704" x2="724" y2="718" stroke="#69f0ae" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="644" y="720" width="160" height="40" rx="5" fill="#001a00" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="724" y="738" text-anchor="middle" font-size="11" font-weight="700" fill="#69f0ae">Swapchain Present</text>
  <text x="724" y="752" text-anchor="middle" font-size="9" fill="#4caf50">R8G8B8A8_SRGB</text>

  <!-- Legend -->
  <rect x="20" y="640" width="380" height="72" rx="4" fill="#0d1117" stroke="#263238" stroke-width="1"/>
  <text x="36" y="658" font-size="9" fill="#546e7a">─── arrow: data flows into</text>
  <text x="36" y="672" font-size="9" fill="#37474f">- - arrow: data read (no ownership change)</text>
  <text x="36" y="686" font-size="9" fill="#29b6f6">blue:  </text><text x="72" y="686" font-size="9" fill="#546e7a">Intermediate HDR Color</text>
  <text x="36" y="700" font-size="9" fill="#ff8a65">orange:</text><text x="90" y="700" font-size="9" fill="#546e7a">Depth (stored)</text>
  <text x="200" y="686" font-size="9" fill="#64b5f6">blue block:  </text><text x="268" y="686" font-size="9" fill="#546e7a">BloomComponent</text>
  <text x="200" y="700" font-size="9" fill="#ce93d8">purple block:</text><text x="268" y="700" font-size="9" fill="#546e7a">BokehComponent</text>
</svg>
