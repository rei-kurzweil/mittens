<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470">
     <defs>
          <marker id="flow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
               <path d="M0,0 L0,8 L8,4 z" fill="#78909c"/>
          </marker>
          <marker id="read" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
               <path d="M0,0 L0,8 L8,4 z" fill="#ff8a65"/>
          </marker>
          <style>
               text { font-family: "JetBrains Mono","Fira Mono","Courier New",monospace; }
          </style>
     </defs>

     <rect width="1040" height="470" fill="#111318"/>

     <text x="520" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#b0bec5">Cat Engine · Current Runtime Post-Processing Graph</text>
     <text x="520" y="45" text-anchor="middle" font-size="10" fill="#607d8b">Bloom path as currently implemented in the renderer</text>

     <rect x="20" y="72" width="190" height="190" rx="8" fill="#0d1117" stroke="#455a64" stroke-width="1.5"/>
     <text x="115" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#90a4ae">[1] Geometry Scope</text>
     <text x="115" y="114" text-anchor="middle" font-size="9" fill="#607d8b">background → opaque → cutout → transparent</text>
     <rect x="34" y="130" width="162" height="28" rx="4" fill="#0a1f0a"/>
     <text x="115" y="148" text-anchor="middle" font-size="10" fill="#81c784">scene color only</text>
     <rect x="34" y="166" width="162" height="28" rx="4" fill="#2a1300"/>
     <text x="115" y="184" text-anchor="middle" font-size="10" fill="#ffab91">scene depth written here</text>
     <text x="115" y="216" text-anchor="middle" font-size="9" fill="#78909c">overlay is deferred when post-processing is active</text>
     <text x="115" y="232" text-anchor="middle" font-size="9" fill="#78909c">MSAA resolves into main sampled targets</text>

     <rect x="250" y="82" width="170" height="72" rx="8" fill="#001822" stroke="#29b6f6" stroke-width="1.5"/>
     <text x="335" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#4fc3f7">Scene Color Targets</text>
     <text x="335" y="122" text-anchor="middle" font-size="9" fill="#81d4fa">main_msaa_color → resolve → main_color</text>
     <text x="335" y="138" text-anchor="middle" font-size="9" fill="#81d4fa">or direct render to main_color</text>

     <rect x="250" y="182" width="170" height="58" rx="8" fill="#220c00" stroke="#ff8a65" stroke-width="1.5"/>
     <text x="335" y="204" text-anchor="middle" font-size="11" font-weight="700" fill="#ffab91">Depth Target</text>
     <text x="335" y="222" text-anchor="middle" font-size="9" fill="#ffccbc">depth</text>

     <line x1="210" y1="134" x2="250" y2="118" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>
     <line x1="210" y1="188" x2="250" y2="210" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>

     <rect x="470" y="82" width="180" height="86" rx="8" fill="#001435" stroke="#42a5f5" stroke-width="1.5"/>
     <text x="560" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#90caf9">[2] Emissive Extraction</text>
     <text x="560" y="124" text-anchor="middle" font-size="9" fill="#90caf9">draw emissive opaque/cutout batches only</text>
     <text x="560" y="140" text-anchor="middle" font-size="9" fill="#90caf9">read-only depth, compare = LessOrEqual</text>
     <text x="560" y="156" text-anchor="middle" font-size="9" fill="#78909c">bloom_source_msaa → resolve → bloom_source</text>

     <line x1="420" y1="116" x2="470" y2="116" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>
     <line x1="335" y1="182" x2="335" y2="60" stroke="#ff8a65" stroke-width="1.4" stroke-dasharray="5,4"/>
     <line x1="335" y1="60" x2="470" y2="60" stroke="#ff8a65" stroke-width="1.4" stroke-dasharray="5,4"/>
     <line x1="470" y1="60" x2="470" y2="102" stroke="#ff8a65" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#read)"/>

     <rect x="705" y="58" width="145" height="52" rx="8" fill="#07192a" stroke="#64b5f6" stroke-width="1.5"/>
     <text x="777" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[3] Copy / Prefilter</text>
     <text x="777" y="97" text-anchor="middle" font-size="9" fill="#90caf9">bloom_source → bloom_a</text>

     <rect x="705" y="126" width="145" height="52" rx="8" fill="#07192a" stroke="#64b5f6" stroke-width="1.5"/>
     <text x="777" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[4] Blur H</text>
     <text x="777" y="165" text-anchor="middle" font-size="9" fill="#90caf9">bloom_a → bloom_b</text>

     <rect x="705" y="194" width="145" height="52" rx="8" fill="#07192a" stroke="#64b5f6" stroke-width="1.5"/>
     <text x="777" y="216" text-anchor="middle" font-size="11" font-weight="700" fill="#90caf9">[5] Blur V</text>
     <text x="777" y="233" text-anchor="middle" font-size="9" fill="#90caf9">bloom_b → bloom_a</text>

     <text x="777" y="266" text-anchor="middle" font-size="9" fill="#64b5f6">linear sampling for downsample, blur, and upsample</text>

     <line x1="650" y1="116" x2="705" y2="84" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>
     <line x1="777" y1="110" x2="777" y2="126" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>
     <line x1="777" y1="178" x2="777" y2="194" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>

     <rect x="470" y="220" width="180" height="78" rx="8" fill="#22003a" stroke="#ba68c8" stroke-width="1.5"/>
     <text x="560" y="243" text-anchor="middle" font-size="12" font-weight="700" fill="#ce93d8">[6] Overlay Scope</text>
     <text x="560" y="262" text-anchor="middle" font-size="9" fill="#e1bee7">reload scene color target</text>
     <text x="560" y="278" text-anchor="middle" font-size="9" fill="#e1bee7">clear depth only for overlay self-occlusion</text>
     <text x="560" y="294" text-anchor="middle" font-size="9" fill="#78909c">does not feed bloom source; still receives bloom later</text>

     <line x1="420" y1="118" x2="444" y2="118" stroke="#78909c" stroke-width="1.3"/>
     <line x1="444" y1="118" x2="444" y2="259" stroke="#78909c" stroke-width="1.3"/>
     <line x1="444" y1="259" x2="470" y2="259" stroke="#78909c" stroke-width="1.3" marker-end="url(#flow)"/>

     <rect x="885" y="116" width="130" height="86" rx="8" fill="#001822" stroke="#29b6f6" stroke-width="1.5"/>
     <text x="950" y="139" text-anchor="middle" font-size="12" font-weight="700" fill="#4fc3f7">[7] Final Composite</text>
     <text x="950" y="158" text-anchor="middle" font-size="9" fill="#81d4fa">main_color + optional bloom_a</text>
     <text x="950" y="174" text-anchor="middle" font-size="9" fill="#81d4fa">fullscreen composite or blit</text>
     <text x="950" y="190" text-anchor="middle" font-size="9" fill="#78909c">output = swapchain or XR eye target</text>

     <line x1="650" y1="259" x2="860" y2="259" stroke="#78909c" stroke-width="1.6"/>
     <line x1="860" y1="259" x2="860" y2="158" stroke="#78909c" stroke-width="1.6"/>
     <line x1="860" y1="158" x2="885" y2="158" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>

     <line x1="850" y1="220" x2="885" y2="174" stroke="#78909c" stroke-width="1.6" marker-end="url(#flow)"/>

     <rect x="885" y="228" width="130" height="50" rx="8" fill="#0d1117" stroke="#607d8b" stroke-width="1.2"/>
     <text x="950" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="#b0bec5">[8] Debug Panels</text>
     <text x="950" y="266" text-anchor="middle" font-size="9" fill="#90a4ae">optional emissive / bloom previews</text>

     <line x1="950" y1="202" x2="950" y2="228" stroke="#78909c" stroke-width="1.4" marker-end="url(#flow)"/>

     <rect x="20" y="320" width="995" height="116" rx="8" fill="#0d1117" stroke="#263238" stroke-width="1"/>
     <text x="38" y="344" font-size="11" font-weight="700" fill="#b0bec5">Notes</text>
     <text x="38" y="365" font-size="10" fill="#90a4ae">• Opaque and cutout depth occlude emissive extraction because overlay no longer clears shared depth before pass [2].</text>
     <text x="38" y="385" font-size="10" fill="#90a4ae">• Overlay is intentionally excluded from emissive extraction, but it is drawn before final composite so bloom still affects it.</text>
     <text x="38" y="405" font-size="10" fill="#90a4ae">• `bloom_a` / `bloom_b` use `bloom_extent`, which is half resolution when `half_res(true)` is enabled.</text>
     <text x="38" y="425" font-size="10" fill="#90a4ae">• This diagram shows the implemented bloom path only; bokeh remains design material in the markdown spec.</text>
</svg>
